<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pixl · Projects</title>
    <link rel="icon" href="/index.icon.png" />
    <link rel="stylesheet" href="/pixl.css" />
    <style>
      .hero {
        padding: 24px 28px;
        margin-top: 8px;
        display: flex;
        align-items: flex-end;
        gap: 20px;
        flex-wrap: wrap;
      }
      .hero-actions {
        margin-left: auto;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .ht-bar {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        margin: 20px 0;
        padding: 15px 20px 13px;
        font-size: 15px;
      }
      .ht-dot {
        width: 12px;
        height: 12px;
        border: 2px solid var(--stroke);
      }
      .ht-dot.on {
        background: var(--good);
      }
      .ht-dot.off {
        background: var(--bad);
      }
      .ht-bars {
        margin: 6px 0 20px;
        display: none;
        flex-direction: column;
        gap: 10px;
        width: 100%;
      }
      .ht-bars.show {
        display: flex;
      }
      .ht-row {
        padding: 13px 18px 12px;
      }
      .ht-row .top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
        font-size: 16px;
      }
      .bar {
        height: 14px;
        border: 3px solid var(--stroke);
        background: var(--panel-deep);
        overflow: hidden;
      }
      .bar > div {
        height: 100%;
        background: repeating-linear-gradient(
          90deg,
          var(--gold) 0 10px,
          var(--gold-soft) 10px 20px
        );
      }
      .section-h {
        font-size: 20px;
        color: var(--gold);
        text-shadow: 2px 2px 0 var(--stroke);
        margin: 26px 0 16px;
        letter-spacing: 1px;
      }
      .proj-thumb {
        height: 140px;
        border: 3px solid var(--stroke);
        background:
          repeating-conic-gradient(
              rgba(22, 22, 30, 0.05) 0% 25%,
              transparent 0% 50%
            )
            0 0 / 22px 22px,
          var(--panel-deep);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        overflow: hidden;
      }
      .proj-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .proj-name {
        font-size: 19px;
        color: var(--ink);
      }
      .proj-meta {
        font-size: 14.5px;
        color: var(--faint);
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      /* full-width project rows */
      .proj-rows {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .proj-row {
        display: flex;
        gap: 20px;
        align-items: stretch;
        padding: 16px 18px;
        width: 100%;
      }
      .proj-row-thumb {
        width: 200px;
        flex-shrink: 0;
        align-self: stretch;
        min-height: 120px;
        border: 3px solid var(--stroke);
        background:
          repeating-conic-gradient(
              rgba(22, 22, 30, 0.05) 0% 25%,
              transparent 0% 50%
            )
            0 0 / 22px 22px,
          var(--panel-deep);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 44px;
        overflow: hidden;
      }
      .proj-row-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .proj-row-body {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .proj-row-head {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .proj-row-head .proj-name {
        font-size: 22px;
      }
      .proj-row-arrow {
        align-self: center;
        color: var(--faint);
        font-size: 30px;
        flex-shrink: 0;
      }
      .proj-row:hover .proj-row-arrow {
        color: var(--gold);
      }
      .proj-row .note-strip {
        margin-top: 2px;
      }
      @media (max-width: 560px) {
        .proj-row {
          flex-direction: column;
          gap: 12px;
        }
        .proj-row-thumb {
          width: 100%;
          height: 160px;
        }
        .proj-row-arrow {
          display: none;
        }
      }
      .note-strip {
        font-family: var(--sans);
        font-size: 13.5px;
        line-height: 1.6;
        padding: 10px 12px;
        border: 2px solid var(--stroke);
        background: rgba(255, 209, 102, 0.1);
        color: var(--gold);
      }
      .note-strip.teal {
        background: rgba(18, 124, 116, 0.1);
        color: var(--teal);
      }
      .tl-list {
        display: flex;
        flex-direction: column;
        margin-top: 6px;
      }
      .tl-item {
        position: relative;
        padding: 0 0 16px 26px;
      }
      .tl-item::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 6px;
        bottom: -2px;
        width: 2px;
        background: var(--stroke);
      }
      .tl-item:last-child::before {
        display: none;
      }
      .tl-dot {
        position: absolute;
        left: -2px;
        top: 0;
        font-size: 17px;
        line-height: 1;
      }
      .tl-head {
        display: flex;
        gap: 10px;
        align-items: baseline;
        flex-wrap: wrap;
      }
      .tl-title {
        font-family: var(--sans);
        font-weight: 700;
        font-size: 14.5px;
        color: var(--ink);
      }
      .tl-time {
        font-family: var(--sans);
        font-size: 12px;
        color: var(--faint);
      }
      .tl-hours {
        font-family: var(--sans);
        font-size: 13px;
        color: var(--teal);
        margin-top: 2px;
      }
      .tl-cut {
        color: var(--bad);
      }
      .tl-note {
        font-family: var(--sans);
        font-size: 13.5px;
        line-height: 1.6;
        margin-top: 6px;
        padding: 8px 11px;
        border: 2px solid var(--stroke);
        background: var(--panel-deep);
        color: var(--ink);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .editor {
        width: 100%;
      }
      .back-btn {
        margin-bottom: 18px;
      }
      .form-grid {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 24px;
      }
      .form-row {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .form-row label {
        font-size: 13px;
        color: var(--faint);
        letter-spacing: 0.5px;
      }
      .open-link {
        font-size: 12px;
        color: var(--teal);
        margin-left: 6px;
        letter-spacing: 0;
      }
      .open-link:hover {
        color: var(--gold);
      }
      .form-row input.field,
      .form-row textarea.field {
        font-size: 15.5px;
      }
      .form-row textarea.field {
        resize: vertical;
        min-height: 80px;
        line-height: 1.6;
      }
      #j-content {
        min-height: 150px;
        resize: none;
        overflow: hidden;
        line-height: 1.6;
      }
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      @media (max-width: 640px) {
        .two-col {
          grid-template-columns: 1fr;
        }
      }
      .level-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      @media (max-width: 640px) {
        .level-row {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .level-btn {
        cursor: pointer;
        border: 3px solid var(--stroke);
        background: var(--panel-deep);
        color: var(--dim);
        font-size: 15px;
        padding: 12px 8px 10px;
        text-align: center;
      }
      .level-btn small {
        display: block;
        font-size: 12px;
        color: var(--faint);
        margin-top: 5px;
        line-height: 1.45;
      }
      .level-btn.sel {
        background: var(--gold);
        color: var(--btn-ink);
      }
      .level-btn.sel small {
        color: rgba(43, 29, 18, 0.72);
      }
      .thumb-box {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .thumb-preview {
        width: 200px;
        height: 130px;
        border: 3px solid var(--stroke);
        background:
          repeating-conic-gradient(
              rgba(22, 22, 30, 0.05) 0% 25%,
              transparent 0% 50%
            )
            0 0 / 20px 20px,
          var(--panel-deep);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-size: 30px;
      }
      .thumb-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .ht-pick {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 220px;
        overflow-y: auto;
        border: 3px solid var(--stroke);
        background: var(--panel-deep);
        padding: 10px;
      }
      .ht-pick label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 15px;
        color: var(--ink);
        cursor: pointer;
        letter-spacing: 0;
        padding: 3px 0;
      }
      .ht-pick input {
        accent-color: var(--gold);
        width: 17px;
        height: 17px;
      }
      .ht-pick .h {
        margin-left: auto;
        color: var(--teal);
        font-size: 14px;
      }
      .check-row {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 15.5px;
        color: var(--ink);
        cursor: pointer;
      }
      .check-row input {
        accent-color: var(--gold);
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }
      .disclosure {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 15px 17px;
        border: 3px solid var(--stroke);
        background: var(--panel-deep);
      }
      .disclosure.update {
        background: rgba(255, 209, 102, 0.06);
        box-shadow: inset 0 0 0 2px rgba(255, 209, 102, 0.25);
      }
      .disclosure-check {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 15.5px;
        font-weight: 600;
        color: var(--ink);
        cursor: pointer;
      }
      .disclosure.update > .disclosure-check:first-child {
        color: var(--gold);
      }
      .disclosure-check input {
        accent-color: var(--gold);
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }
      .disclosure-desc {
        font-size: 13.5px;
        line-height: 1.6;
        color: var(--faint);
        margin: -2px 0 2px;
      }
      .ta-wrap {
        position: relative;
        width: 100%;
      }
      .ta-wrap textarea.field {
        display: block;
        width: 100%;
        box-sizing: border-box;
      }
      .ta-count {
        position: absolute;
        bottom: 8px;
        right: 12px;
        font-size: 11.5px;
        color: var(--faint);
        pointer-events: none;
        background: var(--panel-deep);
        padding: 0 3px;
      }
      .ta-count.full {
        color: var(--bad);
      }
      .ship-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        font-size: 15.5px;
      }
      .ship-item {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .ship-item .ok {
        color: var(--good);
      }
      .ship-item .no {
        color: var(--bad);
      }
      .journal-entry {
        padding: 14px 16px;
      }
      .journal-entry .jmeta {
        font-size: 13px;
        color: var(--faint);
        margin-bottom: 8px;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .journal-entry .jdel {
        margin-left: auto;
        cursor: pointer;
        background: none;
        border: none;
        color: var(--faint);
        font-size: 13px;
      }
      .journal-entry .jdel:hover {
        color: var(--bad);
      }
      .journal-entry .jbody {
        font-size: 15.5px;
        word-break: break-word;
      }
      .jbody img,
      .jbody .bb-img {
        max-width: 100%;
        max-height: 260px;
      }
      .composer {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .md-editor {
        display: flex;
        flex-direction: column;
      }
      .md-bar {
        display: flex;
        gap: 5px;
        align-items: center;
        flex-wrap: wrap;
        padding: 7px 8px;
        background: var(--panel-deep);
        border: 3px solid var(--stroke);
        border-bottom-width: 0;
      }
      .md-btn {
        font-family: var(--pixel);
        font-size: 13px;
        line-height: 1;
        min-width: 30px;
        height: 28px;
        padding: 0 9px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        background: var(--panel);
        color: var(--ink);
        border: 2px solid var(--stroke);
        box-shadow: 2px 2px 0 var(--stroke);
        cursor: pointer;
      }
      .md-btn:hover {
        background: var(--gold);
        color: var(--btn-ink);
        transform: translate(-1px, -1px);
        box-shadow: 3px 3px 0 var(--stroke);
      }
      .md-btn:active {
        transform: translate(1px, 1px);
        box-shadow: 1px 1px 0 var(--stroke);
      }
      .md-btn.active {
        background: var(--gold);
        color: var(--btn-ink);
        box-shadow: inset 2px 2px 0 rgba(0, 0, 0, 0.25);
      }
      .md-btn i {
        font-style: italic;
      }
      .md-sep {
        width: 2px;
        align-self: stretch;
        margin: 1px 3px;
        background: var(--stroke);
        opacity: 0.3;
      }
      .md-preview {
        border: 3px solid var(--stroke);
        border-top-width: 0;
        background: #20160e;
        padding: 12px 14px;
        min-height: 140px;
        font-size: 15.5px;
        line-height: 1.6;
        word-break: break-word;
      }
      .md-preview img {
        max-width: 100%;
        max-height: 260px;
      }
      .md-preview .faint {
        font-size: 14px;
      }
      .composer-foot {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .j-hint {
        font-size: 12.5px;
      }
      .j-hint.bad {
        color: var(--bad);
      }
      .j-hint.ok {
        color: var(--good);
      }
      .composer-foot .btn:last-child {
        margin-left: auto;
      }
      .composer-foot input.field {
        width: 90px;
      }
      .danger-zone {
        margin-top: 30px;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .btn.red {
        background: var(--bad);
        color: var(--btn-ink);
      }
      .status-approved {
        color: var(--good);
      }
      .status-shipped {
        color: var(--teal);
      }
      .status-needs {
        color: var(--bad);
      }
      .earned {
        color: var(--gold);
      }
      .connect-card {
        padding: 40px 30px;
        text-align: center;
        max-width: 560px;
        margin: 20px auto;
      }
      .connect-card h2 {
        color: var(--gold);
        font-size: 24px;
        text-shadow: 3px 3px 0 var(--stroke);
        margin-bottom: 12px;
      }
      .connect-card p {
        color: var(--dim);
        font-size: 14px;
        line-height: 1.8;
        margin-bottom: 22px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero panel-deep">
        <div>
          <h1 class="page-title">PROJECTS</h1>
          <div class="page-sub">
            BUILD · JOURNAL · SHIP · GET PAID IN PIXELS.
          </div>
        </div>
        <div class="hero-actions">
          <a class="btn" href="#new" id="new-btn">+ NEW PROJECT</a>
        </div>
      </section>

      <div id="ht-slot"></div>
      <div class="spin" id="loading"></div>
      <div id="view"></div>
    </main>

    <script src="/pixl.js"></script>
    <script>
      Pixl.mountTopbar("projects");
      Pixl.loadWallet();

      const $ = (id) => document.getElementById(id);
      const LEVELS = [
        ["L1 Greenhorn", "A first ship: simple site, script, or tiny tool."],
        ["L2 Deputy", "A focused app, CLI, or game with clean polish."],
        [
          "L3 Outlaw",
          "Multiple systems working together: backend, state, infra.",
        ],
        [
          "L4 Legend",
          "Deep systems work: complex architecture, serious scope.",
        ],
      ];
      const ERRORS = {
        name_required: "Give it a name first.",
        repo_not_github: "The repo link must be a GitHub repository.",
        ai_notes_required: "Describe how you used AI (at least 10 characters).",
        repo_required: "Add a GitHub repo link before shipping.",
        demo_required: "Add a demo / playable link before shipping.",
        image_required: "Upload a thumbnail before shipping.",
        repo_not_found: "That repo link doesn't load — is it public?",
        demo_unreachable: "The demo link is unreachable.",
        demo_is_repo: "The demo can't be your GitHub repo. Use a playable build or a Releases page.",
        demo_invalid: "That demo link isn't a valid URL.",
        hackatime_hours_required:
          "Link Hackatime projects with at least 1 hour of coding first.",
        hackatime_unavailable:
          "Hackatime is unreachable right now — try again in a bit.",
        update_notes_required: "Describe what changed in this update.",
        update_notes_too_short: "Update notes need at least 100 characters.",
        already_shipped: "This one is already in the review queue.",
        project_banned: "This project is banned and can't be shipped.",
        cdn_not_configured: "Image uploads aren't configured on the server.",
        cdn_failed: "Image upload failed — try again.",
        journal_too_short:
          "Log more detail — journals need ~100 characters per hour.",
        not_in_review: "This project isn't in review.",
      };
      const err = (e) => ERRORS[e] || "Something went wrong — try again.";

      let stats = null;
      let projects = [];
      let form = null;

      function statusInfo(p) {
        if (p.banned_at) return ["BANNED", "status-needs"];
        if (p.rejected_at) return ["REJECTED", "status-needs"];
        if (p.status === "approved") return ["APPROVED", "status-approved"];
        if (p.status === "shipped") return ["IN REVIEW", "status-shipped"];
        if (p.status === "needs_changes")
          return ["NEEDS CHANGES", "status-needs"];
        return ["DRAFT", "muted"];
      }

      function linkedSeconds(p) {
        if (!stats || !stats.connected) return 0;
        const linked = new Set(p.hackatime_projects || []);
        return stats.projects
          .filter((h) => linked.has(h.name))
          .reduce((s, h) => s + h.seconds, 0);
      }

      /* ---------- hackatime strip ---------- */

      function renderHt() {
        const slot = $("ht-slot");
        if (!stats) {
          slot.innerHTML = "";
          return;
        }
        if (!stats.connected) {
          slot.innerHTML = `
      <div class="ht-bar panel">
        <span class="ht-dot off"></span>
        <span>HACKATIME NOT CONNECTED — hours can't be counted until you link it.${stats.error ? ` <span class="faint">(${Pixl.esc(stats.error)})</span>` : ""}</span>
        <a class="btn" style="margin-left:auto" href="${Pixl.apiUrl("/hackatime/connect")}" target="_blank" rel="noopener" id="ht-connect">🔌 CONNECT</a>
      </div>`;
          $("ht-connect").addEventListener("click", () => {
            Pixl.toast(
              "Finishing in the new tab — this page will refresh itself.",
            );
            const poll = setInterval(async () => {
              try {
                const d = await Pixl.api("/api/hackatime/stats");
                if (d.stats && d.stats.connected) {
                  clearInterval(poll);
                  location.reload();
                }
              } catch {}
            }, 3000);
            setTimeout(() => clearInterval(poll), 180000);
          });
          return;
        }
        const sorted = [...stats.projects].sort(
          (a, b) => b.seconds - a.seconds,
        );
        const top = sorted[0];
        slot.innerHTML = `
    <div class="ht-bar panel">
      <span class="ht-dot on"></span>
      <span>HACKATIME CONNECTED</span>
      <span class="teal">${Pixl.hours(stats.totalSeconds)} total</span>
      <span class="faint">·</span>
      <span class="muted">${stats.projects.length} tracked</span>
      <button class="btn ghost" style="margin-left:auto" id="ht-toggle">TIME PER PROJECT ▾</button>
      <a class="btn ghost" href="${Pixl.apiUrl("/hackatime/connect")}" target="_blank" rel="noopener">RECONNECT</a>
    </div>
    <div class="ht-bars" id="ht-bars">
      ${sorted
        .map(
          (p) => `
        <div class="ht-row panel">
          <div class="top"><span>${Pixl.esc(p.name)}</span><span class="teal">${Pixl.hours(p.seconds)}</span></div>
          <div class="bar"><div style="width:${top && top.seconds ? (p.seconds / top.seconds) * 100 : 0}%"></div></div>
        </div>`,
        )
        .join("")}
    </div>`;
        $("ht-toggle").addEventListener("click", () =>
          $("ht-bars").classList.toggle("show"),
        );
      }

      /* ---------- list view ---------- */

      function renderList() {
        $("new-btn").style.display = "";
        const view = $("view");
        if (projects.length === 0) {
          view.innerHTML = `
      <div class="connect-card panel">
        <div style="font-size:48px;margin-bottom:12px"></div>
        <h2>NO PROJECTS YET</h2>
        <p>Log what you're building, link it to Hackatime, journal as you go, then ship it for review — approved hours pay out in pixels.</p>
        <a class="btn" href="#new">+ START YOUR FIRST PROJECT</a>
      </div>`;
          return;
        }
        view.innerHTML = `
    <div class="section-h">MY PROJECTS · ${projects.length}</div>
    <div class="proj-rows">
      ${projects
        .map((p) => {
          const [label, cls] = statusInfo(p);
          const secs = linkedSeconds(p);
          return `
        <a class="card panel proj-row" href="#p=${p.id}">
          <div class="proj-row-thumb">${p.image_url ? `<img src="${Pixl.esc(p.image_url)}" alt="" loading="lazy" onerror="this.remove()">` : ""}</div>

      function journalNeed(hours) {
        return hours > 0 ? Math.max(100, Math.round(hours * 100)) : 0;

        const hint = $("j-hint");

        const len = $("j-content").value.trim().length;
        const need = journalNeed(Number($("j-hours").value) || 0);
        if (need === 0) {
          hint.textContent = len ? `${len} chars` : "";
          hint.classList.remove("bad", "ok");
          return;
        }
        hint.textContent = `${len} / ${need} chars`;
        hint.classList.toggle("bad", len < need);
        hint.classList.toggle("ok", len >= need);

      const VERDICTS = {
        approved: ["APPROVED", "Approved"],
        first_pass_approved: ["REVIEWED", "Passed first review"],
        needs_changes: ["CHANGES", "Sent back for changes"],
        rejected: ["REJECTED", "Rejected"],

      function tlItem(icon, title, at, extra, note) {
        return `<div class="tl-item">
    <span class="tl-dot">${icon}</span>
    <div class="tl-content">
      <div class="tl-head"><span class="tl-title">${title}</span><span class="tl-time">${Pixl.timeAgo(at)}</span></div>
      ${extra || ""}${note || ""}
    </div>
  </div>`;
      }

      function tlRow(e) {
        if (e.kind === "created")
          return tlItem("", "Project created", e.at, "", "");
        if (e.kind === "shipped")
          return tlItem("", "Shipped for review", e.at, "", "");
        const [icon, title] = VERDICTS[e.verdict] || ["REVIEWED", "Reviewed"];
        let hours = "";
        if (e.approvedHours != null) {
          const claimed = Number(e.claimedHours || 0);
          const appr = Number(e.approvedHours);
          const cut = Math.round((claimed - appr) * 10) / 10;
          hours = `<div class="tl-hours">Credited ${appr}h${claimed > appr ? ` of ${claimed}h claimed <span class="tl-cut">(−${cut}h)</span>` : ""}</div>`;
        }
        const note = e.note
          ? `<div class="tl-note">${Pixl.esc(e.note)}</div>`
          : "";
        return tlItem(icon, title, e.at, hours, note);
      }

      function autoGrow(el) {
        if (!el) return;
        el.style.height = "auto";
        el.style.height = el.scrollHeight + "px";
      }

      function mdApply(ta, action) {
        const s = ta.selectionStart,
          e = ta.selectionEnd,
          val = ta.value,
          sel = val.slice(s, e);
        const wrap = (before, after, ph) => {
          const text = sel || ph;
          ta.value = val.slice(0, s) + before + text + after + val.slice(e);
          ta.selectionStart = s + before.length;
          ta.selectionEnd = s + before.length + text.length;
        };
        const linePrefix = (pre) => {
          const ls = val.lastIndexOf("\n", s - 1) + 1;
          const nl = val.indexOf("\n", ls),
            le = nl === -1 ? val.length : nl;
          const line = val.slice(ls, le);
          const has = line.startsWith(pre);
          const newLine = has ? line.slice(pre.length) : pre + line;
          ta.value = val.slice(0, ls) + newLine + val.slice(le);
          const caret = Math.max(ls, s + (has ? -pre.length : pre.length));
          ta.selectionStart = ta.selectionEnd = caret;
        };
        switch (action) {
          case "bold":
            wrap("**", "**", "bold text");
            break;
          case "italic":
            wrap("*", "*", "italic text");
            break;
          case "code":
            sel.includes("\n")
              ? wrap("```\n", "\n```", "code")
              : wrap("`", "`", "code");
            break;
          case "h":
            linePrefix("# ");
            break;
          case "ul":
            linePrefix("- ");
            break;
          case "quote":
            linePrefix("> ");
            break;
          case "link": {
            const text = sel || "text",
              ins = `[${text}](url)`;
            ta.value = val.slice(0, s) + ins + val.slice(e);
            const u = s + text.length + 3;
            ta.selectionStart = u;
            ta.selectionEnd = u + 3;
            break;
          }
        }
        ta.focus();
        ta.dispatchEvent(new Event("input", { bubbles: true }));
      }

      function togglePreview() {
        const ta = $("j-content"),
          pv = $("j-preview"),
          btn = $("j-preview-btn");
        if (!pv.hidden) {
          pv.hidden = true;
          ta.hidden = false;
          btn.classList.remove("active");
          ta.focus();
          return;
        }
        const body = ta.value.trim();
        pv.innerHTML = body
          ? Pixl.markdown(body)
          : `<span class="faint">Nothing to preview yet.</span>`;
        pv.hidden = false;
        ta.hidden = true;
        btn.classList.add("active");
      }

        if (!bar) return;
        bar.addEventListener("click", (ev) => {
          const b = ev.target.closest(".md-btn");
          if (!b) return;
          const a = b.dataset.md;
          if (a === "image") return $("j-img-file").click();
          if (a === "preview") return togglePreview();
          if (!$("j-preview").hidden) togglePreview();
          mdApply($("j-content"), a);
        });
        $("j-content").addEventListener("keydown", (ev) => {
          if (!(ev.ctrlKey || ev.metaKey)) return;
          const k = ev.key.toLowerCase();
          if (k === "b") {
            ev.preventDefault();
            mdApply($("j-content"), "bold");
          } else if (k === "i") {
            ev.preventDefault();
            mdApply($("j-content"), "italic");
          }
        });
      }

      async function loadTimeline(id) {
        let events = [];
        try {
          const d = await Pixl.api(`/api/projects/${id}/timeline`);
          events = d.events || [];
        } catch {}
        const list = $("tl-list");
        if (!list) return;
        list.innerHTML =
          events.length === 0
            ? `<div class="faint" style="font-size:13px;padding:8px">No history yet — ship it to start the timeline.</div>`
            : events.map(tlRow).join("");
      }

      async function loadJournal(id) {
        let entries = [];
        try {
          const d = await Pixl.api(`/api/projects/${id}/journal`);
          entries = d.entries || [];
        } catch {}
        const list = $("j-list");
        if (!list) return;
        list.innerHTML =
          entries.length === 0
            ? `<div class="faint" style="font-size:13px;text-align:center;padding:14px">No entries yet — journal as you build, reviewers read these.</div>`
            : entries
                .map(
                  (e) => `
      <div class="journal-entry panel">
        <div class="jmeta">
          <span>${Pixl.timeAgo(e.created_at)}</span>
          ${e.hours ? `<span class="teal">${Number(e.hours).toFixed(1)}h</span>` : ""}
          <button class="jdel" data-id="${e.id}">delete</button>
        </div>
        <div class="jbody md">${Pixl.markdown(e.content)}</div>
      </div>`,
                )
                .join("");
        list.querySelectorAll(".jdel").forEach((b) =>
          b.addEventListener("click", async () => {
            if (!confirm("Delete this journal entry?")) return;
            const r = await Pixl.send(
              "DELETE",
              `/api/projects/${id}/journal/${b.dataset.id}`,
            );
            if (r.ok) {
              Pixl.toast("Entry deleted.");
              loadJournal(id);
            } else Pixl.toast(err(r.error), true);
          }),
        );
      }

      async function postJournal(id) {
        const content = $("j-content").value.trim();
        if (!content) return Pixl.toast("Write something first!", true);
        $("j-post").disabled = true;
        const r = await Pixl.send("POST", `/api/projects/${id}/journal`, {
          content,
          hours: Number($("j-hours").value) || 0,
        });
        $("j-post").disabled = false;
        if (!r.ok) {
          if (r.error === "journal_too_short")
            return Pixl.toast(
              `Logging ${r.hours}h needs ≥ ${r.need} characters (you have ${content.length}).`,
              true,
            );
          return Pixl.toast(err(r.error), true);
        }
        $("j-content").value = "";
        $("j-hours").value = "0";
        autoGrow($("j-content"));
        Pixl.toast("Entry posted!");
        loadJournal(id);
      }

      async function deleteProject(p) {
        if (
          !confirm(
            `Delete "${p.name}" and all its journal entries? This can't be undone.`,
          )
        )
          return;
        if (!confirm("Really sure? Gone means gone.")) return;
        const r = await Pixl.send("DELETE", `/api/projects/${p.id}`);
        if (!r.ok) return Pixl.toast(err(r.error), true);
        Pixl.toast("Project deleted.");
        await loadProjects();
        location.hash = "#";
      }

      /* ---------- paste-to-upload (thumbnail while editing) ---------- */

      document.addEventListener("paste", (e) => {
        const file = [...(e.clipboardData?.items || [])]
          .find((i) => i.type.startsWith("image/"))
          ?.getAsFile();
        if (!file) return;
        if (document.activeElement === $("j-content")) {
          e.preventDefault();
          Pixl.upload(file)
            .then((url) => {
              $("j-content").value +=
                ($("j-content").value ? "\n" : "") + `![](${url})`;
              autoGrow($("j-content"));
              Pixl.toast("Image attached!");
            })
            .catch((x) => Pixl.toast(err(x.message), true));
        } else if ($("f-thumb-preview")) {
          e.preventDefault();
          setThumb(file);
        }
      });

      /* ---------- router ---------- */

      function route() {
        if (!Pixl.hasToken) return;
        const h = location.hash.replace(/^#/, "");
        $("new-btn").style.display = "";
        if (h === "new") {
          $("new-btn").style.display = "none";
          $("view").innerHTML =
            `<a class="btn dark back-btn" href="#">← ALL PROJECTS</a><div class="editor">${formHtml({})}</div>`;
          bindForm({});
          return;
        }
        if (h.startsWith("p=")) return renderProject(Number(h.slice(2)));
        renderList();
      }

      async function loadProjects() {
        const d = await Pixl.api("/api/projects");
        projects = (d.projects || []).map((p) => ({ ...p, id: Number(p.id) }));
      }

      async function boot() {
        if (!Pixl.hasToken) return;
        try {
          const [s] = await Promise.all([
            Pixl.api("/api/hackatime/stats"),
            loadProjects(),
          ]);
          stats = s.stats || null;
        } catch (e) {
          if (e.message !== "unauthorized")
            Pixl.toast("Couldn't reach the server.", true);
        }
        $("loading").remove();
        renderHt();
        route();
      }
      window.addEventListener("hashchange", route);
      boot();
    </script>
  </body>
</html>
