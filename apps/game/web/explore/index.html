<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixl · Explore</title>
<link rel="icon" href="/index.icon.png">
<link rel="stylesheet" href="/pixl.css">
<style>
  .hero {
    padding: 26px 30px; margin-top: 8px; display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap;
    background:
      radial-gradient(130% 150% at 12% -30%, rgba(18,124,116,.12), transparent 55%),
      linear-gradient(var(--panel), var(--panel-2));
    border: 3px solid var(--stroke);
    box-shadow: var(--drop);
  }
  .hero .page-sub { margin-bottom: 4px; color: var(--teal); }
  .tabs { display: flex; gap: 6px; margin: 22px 0 18px; flex-wrap: wrap; }
  .tab {
    cursor: pointer;
    border: 3px solid var(--stroke);
    background: var(--panel);
    color: var(--dim);
    font-size: 15px;
    letter-spacing: 1px;
    padding: 10px 18px 8px;
    box-shadow: 3px 3px 0 var(--stroke);
  }
  .tab:hover { color: var(--gold); }
  .tab.active {
    background: var(--gold);
    color: var(--btn-ink);
    box-shadow: 3px 3px 0 var(--stroke);
  }
  .searchbar { display: flex; gap: 10px; margin-bottom: 18px; }
  .searchbar input { flex: 1; }
  .pcard { display: flex; flex-direction: column; align-items: center; gap: 9px; text-align: center; padding: 20px 14px 16px; }
  .avatar {
    width: 96px; height: 96px;
    border: 3px solid var(--stroke);
    background: var(--panel-deep);
    box-shadow: inset 0 0 0 2px rgba(255,209,102,.28);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: var(--gold);
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .pcard .pname { font-size: 18px; color: var(--ink); word-break: break-word; }
  .pcard .pmeta { font-size: 13.5px; color: var(--faint); }
  .proj-card { display: flex; flex-direction: column; gap: 10px; }
  .proj-thumb {
    height: 140px;
    border: 3px solid var(--stroke);
    background:
      radial-gradient(circle at 50% 34%, rgba(18,124,116,.10), transparent 62%),
      linear-gradient(var(--panel), var(--panel-deep));
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    overflow: hidden;
  }
  .proj-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .proj-name { font-size: 18px; color: var(--ink); }
  .proj-meta { font-size: 13.5px; color: var(--faint); display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .status-chip { text-transform: uppercase; }
  .board { display: flex; flex-direction: column; gap: 8px; max-width: 720px; }
  .board-row {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 18px 10px;
    background: var(--panel);
    border: 3px solid var(--stroke);
    font-size: 16px;
  }
  .board-row .rank { width: 52px; color: var(--faint); font-size: 18px; }
  .board-row.top1 .rank { color: var(--gold); }
  .board-row.top2 .rank { color: #8a8f96; }
  .board-row.top3 .rank { color: #b5763a; }
  .board-row.you { box-shadow: inset 0 0 0 2px var(--gold); }
  .board-row .bname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .board-row .bpx { color: var(--teal); display: flex; align-items: center; gap: 6px; }
  .board-row .bpx img { width: 15px; height: 15px; }
  .you-card { margin-top: 16px; padding: 14px 18px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; font-size: 15px; }
  .sprint-panel { margin-top: 26px; padding: 18px 20px; border-color: var(--stroke); }
  .sprint-panel h3 { color: var(--teal); font-size: 19px; margin-bottom: 4px; }
  .back-btn { margin-bottom: 18px; }
  .profile-head { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; padding: 24px; }
  .profile-head .avatar { width: 140px; height: 140px; font-size: 60px; }
  .profile-info { flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 10px; }
  .profile-info h2 { color: var(--gold); font-size: 30px; text-shadow: 3px 3px 0 var(--stroke); }
  .stat-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat {
    background: var(--panel-deep);
    border: 3px solid var(--stroke);
    padding: 10px 16px 8px;
    text-align: center;
  }
  .stat .v { color: var(--gold); font-size: 21px; }
  .stat .k { color: var(--faint); font-size: 12.5px; letter-spacing: 1px; }
  .section-h { font-size: 20px; color: var(--gold); text-shadow: 2px 2px 0 var(--stroke); margin: 28px 0 14px; letter-spacing: 1px; }
  .journal { display: flex; flex-direction: column; gap: 12px; max-width: 780px; }
  .journal-entry { padding: 16px 18px; }
  .journal-entry .jmeta { font-size: 13px; color: var(--faint); margin-bottom: 8px; display: flex; gap: 12px; }
  .journal-entry .jbody { font-size: 15.5px; color: var(--ink); word-break: break-word; }
</style>
</head>
<body>
<main class="wrap">
  <section class="hero panel-deep">
    <h1 class="page-title">EXPLORE</h1>
    <div class="page-sub">EVERY HACK CLUBBER, EVERY PROJECT, ONE LEADERBOARD.</div>
  </section>

  <div class="tabs" id="tabs">
    <button class="tab" data-view="players">PLAYERS</button>
    <button class="tab" data-view="projects">PROJECTS</button>
    <button class="tab" data-view="leaderboard">LEADERBOARD</button>
  </div>

  <div id="view"></div>
</main>

<script src="/pixl.js"></script>
<script>
Pixl.mountTopbar("explore");
Pixl.loadWallet();

const view = document.getElementById("view");
const cache = {};

function levelBadge(p) {
  return p.level != null ? `<span class="chip gold">LV ${p.level}</span>` : "";
}

function avatarHtml(p) {
  const letter = Pixl.esc(String(p.display_name || "?").trim().charAt(0).toUpperCase() || "?");
  let src = "";
  if (p.slack_id && p.card_pixelate !== false)
    src = Pixl.apiUrl(`/api/pixify?user=${encodeURIComponent(p.slack_id)}&size=48`);
  else if (p.avatar_url) src = String(p.avatar_url);
  if (!src) return `<div class="avatar">${letter}</div>`;
  return `<div class="avatar"><img src="${Pixl.esc(src)}" alt="" loading="lazy" onerror="this.parentNode.textContent='${letter}'"></div>`;
}

function statusChip(p) {
  const s = String(p.status || "draft");
  const map = { approved: "green", shipped: "teal", needs_changes: "red" };
  return `<span class="chip status-chip ${map[s] || ""}">${Pixl.esc(s.replace("_", " "))}</span>`;
}

function projCard(p) {
  return `
    <a class="card panel proj-card" href="#project=${p.id}">
      <div class="proj-thumb">${p.image_url ? `<img src="${Pixl.esc(p.image_url)}" alt="" loading="lazy" onerror="this.remove()">` : ""}</div>
      <div class="proj-name">${Pixl.esc(p.name)}</div>
      <div class="proj-meta">
        <span>by ${Pixl.esc(p.owner_name || "?")}</span>
        <span>${Pixl.timeAgo(p.created_at)}</span>
      </div>
      <div>${statusChip(p)}${p.hackatime_seconds ? ` <span class="chip teal">${Pixl.hours(p.hackatime_seconds)}</span>` : ""}</div>
    </a>`;
}

/* ---------- views ---------- */

async function showPlayers(q = "") {
  view.innerHTML = `
    <div class="searchbar"><input class="field" id="pq" type="search" placeholder="Find a player…" value="${Pixl.esc(q)}" autocomplete="off"></div>
    <div class="spin"></div>`;
  const input = document.getElementById("pq");
  let t;
  input.addEventListener("input", () => { clearTimeout(t); t = setTimeout(() => showPlayers(input.value.trim()), 350); });
  input.focus();

  const data = await Pixl.api("/api/explore/players" + (q ? "?q=" + encodeURIComponent(q) : ""));
  if (input.value.trim() !== q) return;
  const players = data.players || [];
  view.querySelector(".spin").remove();
  view.insertAdjacentHTML("beforeend", players.length === 0
    ? `<div class="empty-note">NOBODY HERE BY THAT NAME.</div>`
    : `<div class="grid">${players.map((p) => `
        <a class="card panel pcard" href="#player=${Pixl.esc(p.id)}">
          ${avatarHtml(p)}
          <div class="pname">${Pixl.esc(p.display_name)}</div>
          <div class="pmeta">${p.project_count} project${p.project_count === 1 ? "" : "s"} · joined ${Pixl.timeAgo(p.created_at)}</div>
        </a>`).join("")}</div>`);
}

async function showProjects(q = "") {
  view.innerHTML = `
    <div class="searchbar"><input class="field" id="jq" type="search" placeholder="Find a project…" value="${Pixl.esc(q)}" autocomplete="off"></div>
    <div id="showcase"></div>
    <div class="spin"></div>`;
  const input = document.getElementById("jq");
  let t;
  input.addEventListener("input", () => { clearTimeout(t); t = setTimeout(() => showProjects(input.value.trim()), 350); });

  const data = await Pixl.api("/api/explore/projects" + (q ? "?q=" + encodeURIComponent(q) : ""));
  if (input.value.trim() !== q) return;
  const projects = data.projects || [];
  view.querySelector(".spin").remove();
  view.insertAdjacentHTML("beforeend", projects.length === 0
    ? `<div class="empty-note">NO PROJECTS YET — GO MAKE THE FIRST ONE!</div>`
    : `<div class="grid">${projects.map(projCard).join("")}</div>`);
}

async function showLeaderboard() {
  view.innerHTML = `<div class="spin"></div>`;
  const data = await Pixl.api("/api/explore/leaderboard");
  const rows = (data.players || []).map((p) => `
    <div class="board-row ${p.rank <= 3 ? "top" + p.rank : ""} ${p.you ? "you" : ""}">
      <span class="rank">${p.rank <= 3 ? ["#1", "#2", "#3"][p.rank - 1] : "#" + p.rank}</span>
      <span class="bname">${Pixl.esc(p.display_name)}${p.you ? ' <span class="gold">← YOU</span>' : ""}</span>
      <span class="bpx"><img src="/img/pixel.png" alt="">${p.pixels.toLocaleString()} PX</span>
    </div>`).join("");
  const sprint = data.sprint ? `
    <div class="sprint-panel panel-deep">
      <h3>${Pixl.esc(data.sprint.name)}</h3>
      <div class="faint" style="font-size:12px;margin-bottom:12px">Pixels earned during the event only · ${Pixl.countdown(data.sprint.ends_at)}</div>
      <div class="board">${(data.sprint.players || []).map((p) => `
        <div class="board-row ${p.you ? "you" : ""}">
          <span class="rank">#${p.rank}</span>
          <span class="bname">${Pixl.esc(p.display_name)}${p.you ? ' <span class="gold">← YOU</span>' : ""}</span>
          <span class="bpx">${p.pixels.toLocaleString()} PX</span>
        </div>`).join("") || '<div class="faint">No sprint pixels yet — be first!</div>'}
      </div>
      <div class="muted" style="font-size:13px;margin-top:10px">Your sprint total: ${Number(data.sprint.your_pixels || 0).toLocaleString()} PX</div>
    </div>` : "";
  view.innerHTML = `
    <div class="board">${rows || '<div class="empty-note">NO PIXELS ANYWHERE YET.</div>'}</div>
    <div class="you-card panel">
      <span class="gold">YOUR STANDING</span>
      <span>${data.yourRank ? "#" + data.yourRank : "UNRANKED"}</span>
      <span class="teal">${Number(data.yourPixels > 0 ? data.yourPixels : 0).toLocaleString()} PX</span>
      <span class="faint" style="font-size:12px">ship projects to climb</span>
    </div>
    ${sprint}`;
}

async function showPlayer(id) {
  view.innerHTML = `<div class="spin"></div>`;
  let data;
  try { data = await Pixl.api("/api/explore/players/" + encodeURIComponent(id)); }
  catch { view.innerHTML = `<div class="empty-note">PLAYER NOT FOUND.</div>`; return; }
  const p = data.player;
  const projects = data.projects || [];
  view.innerHTML = `
    <button class="btn dark back-btn" onclick="location.hash='#players'">← ALL PLAYERS</button>
    <div class="profile-head panel">
      ${avatarHtml(p)}
      <div class="profile-info">
        <h2>${Pixl.esc(p.display_name)}</h2>
        <div class="stat-row">
          <div class="stat"><div class="v">LV ${p.level ?? 1}</div><div class="k">LEVEL</div></div>
          <div class="stat"><div class="v">${Number(p.xp_hours || 0).toFixed(1)}h</div><div class="k">APPROVED</div></div>
          <div class="stat"><div class="v">${projects.length}</div><div class="k">PROJECTS</div></div>
          <div class="stat"><div class="v">${Pixl.timeAgo(p.created_at)}</div><div class="k">JOINED</div></div>
        </div>
      </div>
    </div>
    <div class="section-h">PROJECTS</div>
    ${projects.length === 0
      ? `<div class="empty-note">NOTHING SHIPPED YET.</div>`
      : `<div class="grid">${projects.map((pr) => projCard({ ...pr, owner_name: p.display_name })).join("")}</div>`}`;
}

async function showProject(id) {
  view.innerHTML = `<div class="spin"></div>`;
  let data;
  try { data = await Pixl.api("/api/explore/projects/" + encodeURIComponent(id)); }
  catch { view.innerHTML = `<div class="empty-note">PROJECT NOT FOUND.</div>`; return; }
  const p = data.project;
  const owner = data.owner;
  const entries = data.entries || [];
  view.innerHTML = `
    <button class="btn dark back-btn" onclick="history.length > 1 ? history.back() : location.hash='#projects'">← BACK</button>
    <div class="profile-head panel">
      <div class="proj-thumb" style="width:220px;height:160px;flex-shrink:0">${p.image_url ? `<img src="${Pixl.esc(p.image_url)}" alt="" onerror="this.remove()">` : ""}</div>
      <div class="profile-info">
        <h2>${Pixl.esc(p.name)}</h2>
        <div>${statusChip(p)}
          ${p.hackatime_seconds ? `<span class="chip teal">${Pixl.hours(p.hackatime_seconds)} CODED</span>` : ""}
          ${p.level ? `<span class="chip">LEVEL ${p.level}</span>` : ""}
        </div>
        <div class="muted" style="font-size:14px">by ${owner ? `<a href="#player=${Pixl.esc(owner.id)}">${Pixl.esc(owner.display_name)}</a>` : "?"} · started ${Pixl.timeAgo(p.created_at)}${p.shipped_at ? ` · shipped ${Pixl.timeAgo(p.shipped_at)}` : ""}</div>
      </div>
    </div>
    ${p.description ? `<div class="jbody md" style="margin-top:16px;font-size:16px">${Pixl.markdown(p.description)}</div>` : ""}
    <div class="section-h">DEVLOG · ${entries.length} ENTR${entries.length === 1 ? "Y" : "IES"}</div>
    ${entries.length === 0
      ? `<div class="empty-note">NO JOURNAL ENTRIES YET.</div>`
      : `<div class="journal">${entries.map((e) => `
          <div class="journal-entry panel">
            <div class="jmeta"><span>${Pixl.timeAgo(e.created_at)}</span>${e.hours ? `<span class="teal">${Number(e.hours).toFixed(1)}h logged</span>` : ""}</div>
            <div class="jbody md">${Pixl.markdown(e.content)}</div>
          </div>`).join("")}</div>`}`;
}

/* ---------- hash router ---------- */

function route() {
  if (!Pixl.hasToken) return;
  const h = location.hash.replace(/^#/, "") || "players";
  const [key, val] = h.split("=");
  document.querySelectorAll(".tab").forEach((t) =>
    t.classList.toggle("active", t.dataset.view === (key === "player" ? "players" : key === "project" ? "projects" : key)));
  if (key === "player" && val) return showPlayer(decodeURIComponent(val));
  if (key === "project" && val) return showProject(decodeURIComponent(val));
  if (key === "projects") return showProjects();
  if (key === "leaderboard") return showLeaderboard();
  return showPlayers();
}

document.querySelectorAll(".tab").forEach((t) =>
  t.addEventListener("click", () => { location.hash = "#" + t.dataset.view; }));
window.addEventListener("hashchange", route);
route();
</script>
</body>
</html>
